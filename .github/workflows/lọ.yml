name: 🚀 SEVER AI STV PREMIUM
on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 Thời gian sử dụng'
        required: false
        default: '5h40m'
        type: choice
        options:
          - '1h'
          - '3h'
          - '5h40m'
jobs:
  Premium-AnyDesk-Setup:
    runs-on: windows-latest
    timeout-minutes: 340
    steps:
      # BANNER CHÀO MỪNG
      - name: 🎯 KHỞI ĐỘNG HỆ THỐNG
        run: |
          Write-Host ""
          Write-Host "🤖 AI STV PREMIUM ANYDESK SERVER" -ForegroundColor Yellow
          Write-Host "⚡ Powered by AI STV" -ForegroundColor Green
          Write-Host "🕒 Thời gian: ${{ github.event.inputs.duration }}" -ForegroundColor Magenta
          Write-Host ""
          $frames = @('⣾', '⣽', '⣻', '⢿', '⡿', '⣟', '⣯', '⣷')
          for($i=0; $i -lt 10; $i++) {
            Write-Host "`r🚀 Đang khởi tạo hệ thống... $($frames[$i % 8])" -NoNewline -ForegroundColor Blue
            Start-Sleep -Milliseconds 100
          }
          Write-Host "`r✅ Hệ thống đã sẵn sàng!" -ForegroundColor Green

      # CÀI ĐẶT ANYDESK
      - name: 📥 CÀI ĐẶT ANYDESK
        run: |
          function New-PremiumPassword {
            $upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ'
            $lower = 'abcdefghijkmnpqrstuvwxyz'
            $numbers = '23456789'
            $all = $upper + $lower + $numbers
            $pw = $upper[(Get-Random -Maximum $upper.Length)] + $lower[(Get-Random -Maximum $lower.Length)] + $numbers[(Get-Random -Maximum $numbers.Length)]
            for ($i = 1; $i -le 5; $i++) { $pw += $all[(Get-Random -Maximum $all.Length)] }
            return -join ($pw.ToCharArray() | Sort-Object { Get-Random })
          }

          Write-Host "📥 Đang tải AnyDesk..." -ForegroundColor Yellow
          $adSetup = "$env:TEMP\AnyDesk.exe"
          Invoke-WebRequest -Uri "https://download.anydesk.com/AnyDesk.exe" -OutFile $adSetup -UseBasicParsing

          $adDir = "C:\AnyDesk"
          $adExe = "$adDir\AnyDesk.exe"

          Write-Host "⚙️  Đang cài đặt AnyDesk (silent)..." -ForegroundColor Yellow
          Start-Process -FilePath $adSetup -ArgumentList "--install `"$adDir`" --start-with-win --silent --create-shortcuts" -Wait
          Start-Sleep -Seconds 5

          if (-not (Test-Path $adExe)) {
            Write-Host "❌ Cài đặt thất bại, không thấy AnyDesk.exe tại $adExe" -ForegroundColor Red
            exit 1
          }

          Write-Host "⏳ Đợi dịch vụ AnyDesk khởi động..." -ForegroundColor Yellow
          Start-Service -Name "AnyDesk" -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5

          $matKhau = if ($env:CUSTOM_RDP_PASS) { $env:CUSTOM_RDP_PASS } else { New-PremiumPassword }
          Write-Host "🔐 Đang đặt mật khẩu truy cập không giám sát..." -ForegroundColor Yellow
          $pwRetries = 0
          do {
            cmd /c "echo $matKhau | `"$adExe`" --set-password" | Out-Null
            Start-Sleep -Seconds 3
            $check = & $adExe --get-id 2>$null
            $pwRetries++
          } while ([string]::IsNullOrWhiteSpace($check) -and $pwRetries -lt 10)

          Write-Host "🆔 Đang lấy AnyDesk ID..." -ForegroundColor Yellow
          $adId = $null
          $idRetries = 0
          while ([string]::IsNullOrWhiteSpace($adId) -and $idRetries -lt 15) {
            $raw = & $adExe --get-id 2>$null
            $adId = ($raw -join "").Trim()
            if ([string]::IsNullOrWhiteSpace($adId)) { Start-Sleep -Seconds 2 }
            $idRetries++
          }

          if ([string]::IsNullOrWhiteSpace($adId)) {
            Write-Host "❌ Không lấy được AnyDesk ID sau nhiều lần thử, kiểm tra log Get-Service AnyDesk" -ForegroundColor Red
            Get-Service -Name "AnyDesk*" -ErrorAction SilentlyContinue | Format-List
            exit 1
          }

          echo "ANYDESK_EXE=$adExe" >> $env:GITHUB_ENV
          echo "ANYDESK_ID=$adId" >> $env:GITHUB_ENV
          echo "ANYDESK_PASS=$matKhau" >> $env:GITHUB_ENV
          Write-Host "✅ AnyDesk đã sẵn sàng | ID: $adId" -ForegroundColor Green

      # HIỂN THỊ THÔNG TIN KẾT NỐI
      - name: 🎉 THÔNG TIN KẾT NỐI
        run: |
          $durationInput = "${{ github.event.inputs.duration }}"
          switch ($durationInput) {
            "1h" { $totalMinutes = 60; $displayTime = "1 giờ" }
            "3h" { $totalMinutes = 180; $displayTime = "3 giờ" }
            "5h40m" { $totalMinutes = 340; $displayTime = "5 giờ 40 phút" }
          }
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $thoiGianKetThuc = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone).AddMinutes($totalMinutes)
          Write-Host ""
          Write-Host "┌───────────────────────────────────────────┐" -ForegroundColor Cyan
          Write-Host "│        🎉 ANYDESK SẴN SÀNG!          │" -ForegroundColor Cyan
          Write-Host "├───────────────────────────────────────────┤" -ForegroundColor Cyan
          Write-Output "│ 🆔  AnyDesk ID: $env:ANYDESK_ID"
          Write-Output "│ 🔐  Mật khẩu: $env:ANYDESK_PASS"
          Write-Output "│ ⏰  Thời lượng: $displayTime"
          Write-Output "│ 🕐  Kết thúc: $($thoiGianKetThuc.ToString('HH:mm:ss'))"
          Write-Host "├───────────────────────────────────────────┤" -ForegroundColor Cyan
          Write-Output "│ 💡 Cách kết nối:"
          Write-Output "│   1. Mở app AnyDesk (PC/điện thoại)"
          Write-Output "│   2. Nhập ID ở trên vào ô 'Remote Desktop'"
          Write-Output "│   3. Bấm Connect, nhập mật khẩu khi được hỏi"
          Write-Host "└───────────────────────────────────────────┘" -ForegroundColor Cyan
          echo "TOTAL_MINUTES=$totalMinutes" >> $env:GITHUB_ENV

      # DUY TRÌ PHIÊN
      - name: ⏳ DUY TRÌ KẾT NỐI
        run: |
          $totalMinutes = $env:TOTAL_MINUTES
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $endTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone).AddMinutes($totalMinutes)
          Write-Host "🔄 Đang duy trì phiên trong $totalMinutes phút..." -ForegroundColor Yellow
          $frames = @('⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏')
          $startTime = Get-Date
          do {
            $now = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
            $remaining = $endTime - $now
            if ($remaining.TotalSeconds -le 0) { break }
            $h = [math]::Floor($remaining.TotalHours)
            $m = [math]::Floor($remaining.TotalMinutes % 60)
            $s = [math]::Floor($remaining.TotalSeconds % 60)
            $f = $frames[([int]((Get-Date)-$startTime).TotalSeconds) % $frames.Length]
            Write-Host "`r$f ⏳ Còn lại: $h giờ $m phút $s giây" -NoNewline -ForegroundColor Cyan
            $proc = Get-Process -Name "AnyDesk" -ErrorAction SilentlyContinue
            if (-not $proc -and $env:ANYDESK_EXE) { Start-Process -FilePath $env:ANYDESK_EXE -ErrorAction SilentlyContinue }
            Start-Sleep -Seconds 5
          } while ($true)
          Write-Host "`n🎯 Hết thời gian" -ForegroundColor Red

      # DỌN DẸP
      - name: 🧹 DỌN DẸP HỆ THỐNG
        if: always()
        run: |
          Write-Host "🧹 Đang dọn dẹp..." -ForegroundColor Yellow
          Stop-Process -Name "AnyDesk" -Force -ErrorAction SilentlyContinue
          if ($env:ANYDESK_EXE) { Start-Process -FilePath $env:ANYDESK_EXE -ArgumentList "--remove" -Wait -ErrorAction SilentlyContinue }
          Remove-Item "$env:TEMP\AnyDesk.exe" -ErrorAction SilentlyContinue
          Write-Host "✅ Dọn dẹp hoàn tất" -ForegroundColor Green
