name: 🚀 SEVER AI STV PREMIUM
on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 Thời gian sử dụng'
        required: false
        default: '5h40m'
        type: choice
        options:
          - '1h'
          - '3h'
          - '5h40m'

jobs:
  Premium-RDP-Setup:
    runs-on: windows-latest
    timeout-minutes: 340
    steps:
      # BANNER CHÀO MỪNG
      - name: 🎯 KHỞI ĐỘNG HỆ THỐNG
        run: |
          Write-Host ""
          Write-Host "🤖 AI STV PREMIUM RDP SERVER" -ForegroundColor Yellow
          Write-Host "⚡ Powered by AI STV" -ForegroundColor Green
          Write-Host "🕒 Thời gian: ${{ github.event.inputs.duration }}" -ForegroundColor Magenta
          $frames = @('⣾', '⣽', '⣻', '⢿', '⡿', '⣟', '⣯', '⣷')
          for($i=0; $i -lt 10; $i++) {
            Write-Host "`r🚀 Đang khởi tạo... $($frames[$i % 8])" -NoNewline -ForegroundColor Blue
            Start-Sleep -Milliseconds 100
          }
          Write-Host "`r✅ Hệ thống sẵn sàng!" -ForegroundColor Green

      # CẤU HÌNH RDP
      - name: 🔧 CẤU HÌNH HỆ THỐNG
        run: |
          Write-Host "🛠️  Đang cấu hình RDP..." -ForegroundColor Yellow
          # Bật Remote Desktop
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          # Tắt NLA để tương thích tốt hơn
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 1 -Force
          # Mở firewall
          netsh advfirewall firewall add rule name="RDP-Premium" dir=in action=allow protocol=TCP localport=3389
          netsh advfirewall firewall add rule name="RDP-Premium-Out" dir=out action=allow protocol=TCP localport=3389
          # Khởi động dịch vụ
          Set-Service -Name TermService -StartupType Automatic -ErrorAction SilentlyContinue
          Start-Service -Name TermService -ErrorAction SilentlyContinue
          Write-Host "✅ Cấu hình RDP hoàn tất" -ForegroundColor Green
      # TẠO USER
      - name: 👤 TẠO TÀI KHOẢN PREMIUM
        run: |
          Write-Host "👤 Đang tạo tài khoản..." -ForegroundColor Yellow
          function New-PremiumPassword {
            $upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ'; $lower = 'abcdefghijkmnpqrstuvwxyz'; $numbers = '23456789'
            $all = $upper + $lower + $numbers
            $pw = $upper[(Get-Random -Maximum $upper.Length)] + $lower[(Get-Random -Maximum $lower.Length)] + $numbers[(Get-Random -Maximum $numbers.Length)]
            for ($i = 1; $i -le 5; $i++) { $pw += $all[(Get-Random -Maximum $all.Length)] }
            return -join ($pw.ToCharArray() | Sort-Object { Get-Random })
          }
          $matKhau = if ($env:CUSTOM_RDP_PASS) { $env:CUSTOM_RDP_PASS } else { New-PremiumPassword }
          $securePass = ConvertTo-SecureString $matKhau -AsPlainText -Force
          Remove-LocalUser -Name "AISTV-PREMIUM" -ErrorAction SilentlyContinue
          New-LocalUser -Name "AISTV-PREMIUM" -Password $securePass -AccountNeverExpires -PasswordNeverExpires $true
          Add-LocalGroupMember -Group "Administrators","Remote Desktop Users" -Member "AISTV-PREMIUM" -ErrorAction SilentlyContinue
          Enable-LocalUser -Name "AISTV-PREMIUM"
          echo "RDP_USER=AISTV-PREMIUM" >> $env:GITHUB_ENV
          echo "RDP_PASS=$matKhau" >> $env:GITHUB_ENV
          echo "$matKhau" > $env:TEMP\rdp_password.txt
          Write-Host "✅ User: AISTV-PREMIUM | Pass: $matKhau" -ForegroundColor Green

      # CLOUDFLARE TUNNEL - THAY THẾ TAILSCALE
      - name: 🌐 THIẾT LẬP CLOUDFLARE TUNNEL
        run: |
          Write-Host "🌐 Đang thiết lập Cloudflare Tunnel..." -ForegroundColor Yellow
          # Tải cloudflared
          $cfPath = "$env:TEMP\cloudflared.exe"
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile $cfPath
          
          # Tạo tunnel ngẫu nhiên (dạng trycloudflare.com - không cần account)
          $tunnelName = "ai-stv-$((Get-Random -Maximum 99999))"
          
          # Khởi động tunnel TCP trỏ tới localhost:3389
          $proc = Start-Process -FilePath $cfPath -ArgumentList "tunnel", "--url", "tcp://localhost:3389", "--hostname", "$tunnelName.trycloudflare.com" -PassThru -NoNewWindow
          Start-Sleep -Seconds 8
          
          # Lấy public URL từ log hoặc thử kết nối
          $publicUrl = "$tunnelName.trycloudflare.com"
          echo "RDP_HOST=$publicUrl" >> $env:GITHUB_ENV
          echo "RDP_PORT=3389" >> $env:GITHUB_ENV
          
          # Kiểm tra tunnel hoạt động
          try {
            $test = Invoke-WebRequest -Uri "https://$publicUrl" -TimeoutSec 5 -UseBasicParsing -ErrorAction Stop
            Write-Host "✅ Tunnel đã hoạt động: $publicUrl:3389" -ForegroundColor Green
          } catch {
            Write-Host "⚠️  Tunnel đang khởi tạo, tiếp tục..." -ForegroundColor Yellow
          }
          Write-Host "🎯 Kết nối qua: $publicUrl:3389" -ForegroundColor Cyan
      # HIỂN THỊ THÔNG TIN KẾT NỐI
      - name: 🎉 THÔNG TIN KẾT NỐI
        run: |
          $matKhau = Get-Content $env:TEMP\rdp_password.txt -ErrorAction SilentlyContinue
          $durationInput = "${{ github.event.inputs.duration }}"
          switch ($durationInput) {
            "1h" { $totalMinutes = 60; $displayTime = "1 giờ" }
            "3h" { $totalMinutes = 180; $displayTime = "3 giờ" }
            "5h40m" { $totalMinutes = 340; $displayTime = "5 giờ 40 phút" }
          }
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $thoiGianBatDau = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
          $thoiGianKetThuc = $thoiGianBatDau.AddMinutes($totalMinutes)
          
          Write-Host ""
          Write-Host "┌─────────────────────────────────────┐" -ForegroundColor Cyan
          Write-Host "│     🎉 KẾT NỐI RDP THÀNH CÔNG!      │" -ForegroundColor Cyan
          Write-Host "├─────────────────────────────────────┤" -ForegroundColor Cyan
          Write-Host "│ 🌐 Server: $env:RDP_HOST" -ForegroundColor White
          Write-Host "│ 🔌 Port: $env:RDP_PORT" -ForegroundColor White
          Write-Host "│ 👤 User: AISTV-PREMIUM" -ForegroundColor White
          Write-Host "│ 🔐 Pass: $matKhau" -ForegroundColor White
          Write-Host "│ ⏰ Thời lượng: $displayTime" -ForegroundColor White
          Write-Host "│ 🕐 Kết thúc: $($thoiGianKetThuc.ToString('HH:mm:ss'))" -ForegroundColor White
          Write-Host "├─────────────────────────────────────┤" -ForegroundColor Cyan
          Write-Host "│ 💡 Cách kết nối (Windows):           │" -ForegroundColor Cyan
          Write-Host "│   1. Nhấn Win+R → gõ: mstsc          │" -ForegroundColor Yellow
          Write-Host "│   2. Nhập: $env:RDP_HOST:$env:RDP_PORT" -ForegroundColor Yellow
          Write-Host "│   3. User: AISTV-PREMIUM             │" -ForegroundColor Yellow
          Write-Host "│   4. Password: (xem trên)            │" -ForegroundColor Yellow
          Write-Host "│   5. Bỏ qua cảnh báo certificate ✓   │" -ForegroundColor Yellow
          Write-Host "└─────────────────────────────────────┘" -ForegroundColor Cyan
          echo "TOTAL_MINUTES=$totalMinutes" >> $env:GITHUB_ENV

      # DUY TRÌ PHIÊN
      - name: ⏳ DUY TRÌ KẾT NỐI
        run: |
          $totalMinutes = $env:TOTAL_MINUTES
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $endTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone).AddMinutes($totalMinutes)
          Write-Host "🔄 Đang duy trì phiên trong $totalMinutes phút..." -ForegroundColor Yellow
          $frames = @('⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏')
          $startTime = Get-Date
          do {
            $now = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
            $remaining = $endTime - $now
            if ($remaining.TotalSeconds -le 0) { break }
            $h = [math]::Floor($remaining.TotalHours)
            $m = [math]::Floor($remaining.TotalMinutes % 60)            $s = [math]::Floor($remaining.TotalSeconds % 60)
            $f = $frames[([int]((Get-Date)-$startTime).TotalSeconds) % $frames.Length]
            Write-Host "`r$f ⏳ Còn lại: $h giờ $m phút $s giây" -NoNewline -ForegroundColor Cyan
            # Kiểm tra dịch vụ RDP
            $svc = Get-Service -Name TermService -ErrorAction SilentlyContinue
            if ($svc.Status -ne 'Running') { Start-Service TermService -ErrorAction SilentlyContinue }
            Start-Sleep -Seconds 5
          } while ($true)
          Write-Host "`n🎯 Hết thời gian - Dừng phiên" -ForegroundColor Red

      # DỌN DẸP
      - name: 🧹 DỌN DẸP HỆ THỐNG
        if: always()
        run: |
          Write-Host "🧹 Đang dọn dẹp..." -ForegroundColor Yellow
          # Dừng cloudflared
          Stop-Process -Name cloudflared -ErrorAction SilentlyContinue
          # Vô hiệu hóa user
          Disable-LocalUser -Name "AISTV-PREMIUM" -ErrorAction SilentlyContinue
          # Xóa file nhạy cảm
          Remove-Item "$env:TEMP\rdp_password.txt" -ErrorAction SilentlyContinue
          # Tắt RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 1 -Force -ErrorAction SilentlyContinue
          Write-Host "✅ Dọn dẹp hoàn tất" -ForegroundColor Green
