name: 🚀 SEVER AI STV PREMIUM
on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 Thời gian sử dụng'
        required: false
        default: '5h40m'
        type: choice
        options:
          - '1h'
          - '3h'
          - '5h40m'
jobs:
  Premium-RustDesk-Setup:
    runs-on: windows-latest
    timeout-minutes: 340
    steps:
      # BANNER CHÀO MỪNG
      - name: 🎯 KHỞI ĐỘNG HỆ THỐNG
        run: |
          Write-Host ""
          Write-Host "🤖 AI STV PREMIUM RUSTDESK SERVER" -ForegroundColor Yellow
          Write-Host "⚡ Powered by AI STV" -ForegroundColor Green
          Write-Host "🕒 Thời gian: ${{ github.event.inputs.duration }}" -ForegroundColor Magenta
          Write-Host ""
          $frames = @('⣾', '⣽', '⣻', '⢿', '⡿', '⣟', '⣯', '⣷')
          for($i=0; $i -lt 10; $i++) {
            Write-Host "`r🚀 Đang khởi tạo hệ thống... $($frames[$i % 8])" -NoNewline -ForegroundColor Blue
            Start-Sleep -Milliseconds 100
          }
          Write-Host "`r✅ Hệ thống đã sẵn sàng!" -ForegroundColor Green

      # CÀI ĐẶT RUSTDESK
      - name: 📥 CÀI ĐẶT RUSTDESK
        run: |
          function New-PremiumPassword {
            $upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ'
            $lower = 'abcdefghijkmnpqrstuvwxyz'
            $numbers = '23456789'
            $all = $upper + $lower + $numbers
            $pw = $upper[(Get-Random -Maximum $upper.Length)] + $lower[(Get-Random -Maximum $lower.Length)] + $numbers[(Get-Random -Maximum $numbers.Length)]
            for ($i = 1; $i -le 5; $i++) { $pw += $all[(Get-Random -Maximum $all.Length)] }
            return -join ($pw.ToCharArray() | Sort-Object { Get-Random })
          }

          $installDir = "$env:ProgramFiles\RustDesk"
          $rdExe = "$installDir\rustdesk.exe"

          Write-Host "📥 Đang tải RustDesk..." -ForegroundColor Yellow
          Invoke-WebRequest -Uri "https://github.com/rustdesk/rustdesk/releases/download/1.2.6/rustdesk-1.2.6-x86_64.exe" -OutFile "$env:TEMP\rustdesk.exe" -UseBasicParsing

          Write-Host "⚙️  Đang cài đặt RustDesk (silent)..." -ForegroundColor Yellow
          Start-Process "$env:TEMP\rustdesk.exe" -ArgumentList "--silent-install"
          Start-Sleep -Seconds 30

          if (-not (Test-Path $rdExe)) {
            Write-Host "❌ Không thấy rustdesk.exe sau khi cài tại $rdExe" -ForegroundColor Red
            exit 1
          }

          Write-Host "🔧 Đang cài service..." -ForegroundColor Yellow
          Set-Location $installDir
          $svc = Get-Service -Name "Rustdesk" -ErrorAction SilentlyContinue
          if (-not $svc) {
            Start-Process ".\rustdesk.exe" -ArgumentList "--install-service" -Wait
            Start-Sleep -Seconds 15
            $svc = Get-Service -Name "Rustdesk" -ErrorAction SilentlyContinue
          }

          $waitCount = 0
          while ($svc -and $svc.Status -ne 'Running' -and $waitCount -lt 12) {
            Start-Service "Rustdesk" -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 5
            $svc.Refresh()
            $waitCount++
          }
          Write-Host "🔧 Service status: $($svc.Status)" -ForegroundColor Yellow

          Write-Host "🆔 Đang lấy RustDesk ID..." -ForegroundColor Yellow
          $rdId = $null
          $idRetries = 0
          while ([string]::IsNullOrWhiteSpace($rdId) -and $idRetries -lt 15) {
            $rdId = (& ".\rustdesk.exe" --get-id 2>$null | Out-String).Trim()
            if ([string]::IsNullOrWhiteSpace($rdId)) { Start-Sleep -Seconds 3 }
            $idRetries++
          }

          if ([string]::IsNullOrWhiteSpace($rdId)) {
            Write-Host "❌ Không lấy được ID sau nhiều lần thử" -ForegroundColor Red
            Get-Service -Name "Rustdesk*" -ErrorAction SilentlyContinue | Format-List
            exit 1
          }

          $matKhau = if ($env:CUSTOM_RDP_PASS) { $env:CUSTOM_RDP_PASS } else { New-PremiumPassword }
          Write-Host "🔐 Đang đặt mật khẩu cố định..." -ForegroundColor Yellow
          Start-Process ".\rustdesk.exe" -ArgumentList "--password $matKhau" -Wait
          Start-Sleep -Seconds 2

          echo "RUSTDESK_EXE=$rdExe" >> $env:GITHUB_ENV
          echo "RUSTDESK_ID=$rdId" >> $env:GITHUB_ENV
          echo "RUSTDESK_PASS=$matKhau" >> $env:GITHUB_ENV
          Write-Host "✅ RustDesk đã sẵn sàng | ID: $rdId" -ForegroundColor Green

      # HIỂN THỊ THÔNG TIN KẾT NỐI
      - name: 🎉 THÔNG TIN KẾT NỐI
        run: |
          $durationInput = "${{ github.event.inputs.duration }}"
          switch ($durationInput) {
            "1h" { $totalMinutes = 60; $displayTime = "1 giờ" }
            "3h" { $totalMinutes = 180; $displayTime = "3 giờ" }
            "5h40m" { $totalMinutes = 340; $displayTime = "5 giờ 40 phút" }
          }
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $thoiGianKetThuc = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone).AddMinutes($totalMinutes)
          Write-Host ""
          Write-Host "┌───────────────────────────────────────────┐" -ForegroundColor Cyan
          Write-Host "│        🎉 RUSTDESK SẴN SÀNG!         │" -ForegroundColor Cyan
          Write-Host "├───────────────────────────────────────────┤" -ForegroundColor Cyan
          Write-Output "│ 🆔  RustDesk ID: $env:RUSTDESK_ID"
          Write-Output "│ 🔐  Mật khẩu: $env:RUSTDESK_PASS"
          Write-Output "│ ⏰  Thời lượng: $displayTime"
          Write-Output "│ 🕐  Kết thúc: $($thoiGianKetThuc.ToString('HH:mm:ss'))"
          Write-Host "├───────────────────────────────────────────┤" -ForegroundColor Cyan
          Write-Output "│ 💡 Cách kết nối:"
          Write-Output "│   1. Mở app RustDesk (PC/điện thoại)"
          Write-Output "│   2. Nhập ID ở trên vào ô 'ID đối tác'"
          Write-Output "│   3. Bấm Connect, nhập mật khẩu khi được hỏi"
          Write-Host "└───────────────────────────────────────────┘" -ForegroundColor Cyan
          echo "TOTAL_MINUTES=$totalMinutes" >> $env:GITHUB_ENV

      # DUY TRÌ PHIÊN
      - name: ⏳ DUY TRÌ KẾT NỐI
        run: |
          $totalMinutes = $env:TOTAL_MINUTES
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $endTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone).AddMinutes($totalMinutes)
          Write-Host "🔄 Đang duy trì phiên trong $totalMinutes phút..." -ForegroundColor Yellow
          $frames = @('⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏')
          $startTime = Get-Date
          do {
            $now = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
            $remaining = $endTime - $now
            if ($remaining.TotalSeconds -le 0) { break }
            $h = [math]::Floor($remaining.TotalHours)
            $m = [math]::Floor($remaining.TotalMinutes % 60)
            $s = [math]::Floor($remaining.TotalSeconds % 60)
            $f = $frames[([int]((Get-Date)-$startTime).TotalSeconds) % $frames.Length]
            Write-Host "`r$f ⏳ Còn lại: $h giờ $m phút $s giây" -NoNewline -ForegroundColor Cyan
            $svc = Get-Service -Name "Rustdesk" -ErrorAction SilentlyContinue
            if ($svc -and $svc.Status -ne 'Running') { Start-Service "Rustdesk" -ErrorAction SilentlyContinue }
            Start-Sleep -Seconds 5
          } while ($true)
          Write-Host "`n🎯 Hết thời gian" -ForegroundColor Red

      # DỌN DẸP
      - name: 🧹 DỌN DẸP HỆ THỐNG
        if: always()
        run: |
          Write-Host "🧹 Đang dọn dẹp..." -ForegroundColor Yellow
          Stop-Service "Rustdesk" -Force -ErrorAction SilentlyContinue
          Stop-Process -Name "rustdesk" -Force -ErrorAction SilentlyContinue
          Remove-Item "$env:TEMP\rustdesk.exe" -ErrorAction SilentlyContinue
          Write-Host "✅ Dọn dẹp hoàn tất" -ForegroundColor Green
